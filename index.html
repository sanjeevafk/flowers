<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Eternal Bouquet — 3D Realistic Floral Experience</title>
  
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..800;1,400..800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

    :root {
      --sidebar-width: 300px;
      --bg-gradient: radial-gradient(circle at 50% 30%, #1e1b4b 0%, #0f172a 60%, #020617 100%);
      --glass: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.14);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-card: rgba(15, 23, 42, 0.65);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #f43f5e;
      --font-serif: "Playfair Display", Georgia, serif;
      --font-sans: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0; padding: 0; height: 100vh; overflow: hidden;
      font-family: var(--font-sans); background: var(--bg-gradient); color: var(--text-main);
      display: flex;
    }

    /* Layout */
    #root { display: flex; width: 100%; height: 100%; }
    
    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width); 
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(20px);
      height: 100%;
      border-right: 1px solid var(--glass-border); 
      display: flex; 
      flex-direction: column;
      position: relative; 
      z-index: 20; 
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    }
    
    .sidebar-header {
      padding: 1.8rem 1.5rem; 
      border-bottom: 1px solid var(--glass-border);
    }
    .brand { 
      font-family: var(--font-serif); 
      font-size: 1.6rem; 
      background: linear-gradient(135deg, #f43f5e, #fb7185, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700; 
      letter-spacing: -0.5px;
    }
    
    .flower-list {
      flex: 1; 
      overflow-y: auto; 
      padding: 1rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
    }

    .flower-item {
      display: flex; 
      align-items: center; 
      gap: 1rem; 
      padding: 0.9rem 1rem;
      margin-bottom: 0.6rem; 
      border-radius: 14px; 
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
      border: 1px solid transparent;
      background: var(--glass);
    }
    .flower-item:hover { 
      background: var(--glass-hover); 
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
    .flower-item.active { 
      background: linear-gradient(135deg, rgba(244,63,94,0.25), rgba(168,85,247,0.25)); 
      border-color: rgba(244,63,94,0.5);
      box-shadow: 0 4px 20px rgba(244,63,94,0.2);
    }
    .flower-emoji { 
      font-size: 1.6rem; 
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); 
    }
    .flower-info h4 { 
      margin: 0; 
      font-size: 0.95rem; 
      font-weight: 600; 
      color: #f1f5f9;
    }
    .flower-info span { 
      font-size: 0.75rem; 
      color: var(--text-muted); 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
    }

    /* Canvas Area */
    .canvas-area {
      flex: 1; 
      position: relative; 
      overflow: hidden;
      display: flex; 
      flex-direction: column; 
      justify-content: space-between; 
      align-items: center; 
      background: radial-gradient(ellipse at top, #1e1b4b 0%, #0f172a 70%, #020617 100%);
      padding-top: 1.5rem; 
      padding-bottom: 0;
    }

    /* Floating Ambient Petals Background */
    .ambient-petals {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .ambient-petal {
      position: absolute;
      background: radial-gradient(circle, rgba(244,63,94,0.6) 0%, rgba(244,63,94,0) 70%);
      border-radius: 50% 0 50% 50%;
      filter: blur(1px);
      animation: floatPetal 12s linear infinite;
    }

    @keyframes floatPetal {
      0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.7; }
      100% { transform: translateY(110vh) rotate(720deg) scale(1.2); opacity: 0; }
    }

    /* Message Card */
    .message-card {
      position: relative;
      z-index: 10;
      width: 90%; 
      max-width: 540px; 
      padding: 2rem 2.5rem;
      background: var(--glass-card); 
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); 
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.2);
      text-align: center;
      animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      margin-top: 1.5rem;
      flex-shrink: 0;
    }
    .message-text {
      font-family: var(--font-serif); 
      font-size: 1.45rem; 
      line-height: 1.5;
      color: #f8fafc; 
      margin-bottom: 0.8rem; 
      font-style: italic;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .message-decoration { 
      color: #f43f5e; 
      font-size: 1.3rem; 
      margin-top: 0.5rem; 
      display: inline-block;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* Bouquet Wrapper */
    .bouquet-container {
      position: relative; 
      width: 100%; 
      flex: 1; 
      display: flex; 
      justify-content: center; 
      align-items: flex-end; 
      overflow: hidden; 
      pointer-events: none;
    }

    .bouquet-inner {
      position: relative;
      width: 480px;
      height: 100%;
      min-height: 480px;
    }

    /* Controls Bar */
    .controls-bar {
      position: absolute; 
      bottom: 2rem; 
      right: 2rem; 
      z-index: 30;
      display: flex;
      gap: 12px;
    }

    .action-btn {
      background: rgba(30, 41, 59, 0.85); 
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); 
      padding: 0.85rem 1.4rem; 
      border-radius: 50px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4); 
      cursor: pointer;
      font-weight: 600; 
      font-size: 0.9rem;
      color: #f8fafc; 
      display: flex; 
      gap: 8px; 
      align-items: center;
      transition: all 0.25s ease;
    }
    .action-btn:hover { 
      background: rgba(51, 65, 85, 0.9);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }
    .action-btn:active { transform: scale(0.95); }
    .action-btn.primary {
      background: linear-gradient(135deg, #f43f5e, #e11d48);
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 8px 25px rgba(244,63,94,0.4);
    }
    .action-btn.primary:hover {
      background: linear-gradient(135deg, #fb7185, #f43f5e);
      box-shadow: 0 12px 30px rgba(244,63,94,0.6);
    }

    /* Mobile Toggle */
    .menu-toggle {
      position: absolute; top: 1.2rem; left: 1.2rem; z-index: 30;
      background: rgba(30, 41, 59, 0.85); 
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border); 
      color: white;
      padding: 0.8rem; border-radius: 50%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer;
      display: none;
    }

    /* Music Toggle */
    .music-btn {
      position: absolute; top: 1.2rem; right: 1.2rem; z-index: 40;
      background: rgba(30, 41, 59, 0.85); 
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border); 
      color: white;
      width: 46px; height: 46px;
      border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; transition: all 0.25s ease;
    }
    .music-btn:hover { transform: scale(1.08); background: rgba(51, 65, 85, 0.9); }

    /* Toast Notification */
    .toast {
      position: absolute; top: 5rem; left: 50%; transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px);
      border: 1px solid rgba(244,63,94,0.5); color: #fff;
      padding: 0.8rem 1.5rem; border-radius: 30px;
      font-size: 0.9rem; font-weight: 500; z-index: 100;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: fadeInOut 3s ease forwards;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translate(-50%, -10px); }
      15% { opacity: 1; transform: translate(-50%, 0); }
      85% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, -10px); }
    }

    /* Animations */
    @keyframes floatIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes sway { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
    @keyframes bloom { from { transform: scale(0) rotate(-15deg); opacity: 0; } to { transform: scale(1) rotate(0deg); opacity: 1; } }

    /* Media Queries */
    @media (max-width: 768px) {
      .sidebar { position: absolute; left: 0; top: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .menu-toggle { display: block; }
      .message-card { padding: 1.4rem; margin-top: 3.5rem; max-width: 92%; }
      .message-text { font-size: 1.15rem; }
      .bouquet-inner { width: 340px; }
      .controls-bar { bottom: 1.2rem; right: 1.2rem; gap: 8px; }
      .action-btn { padding: 0.7rem 1.1rem; font-size: 0.82rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React & Babel CDNs -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- html2canvas CDN for Image Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 14 HIGH-DIMENSIONAL REALISTIC FLOWERS DATA ---
    const FLOWERS = [
      { id: 'rose', name: 'Royal Red Rose', type: 'rose', palette: ['#e11d48', '#881337', '#f43f5e'], desc: 'Love & Passion', emoji: '🌹' },
      { id: 'orchid', name: 'Mystic Orchid', type: 'orchid', palette: ['#c084fc', '#581c87', '#e9d5ff'], desc: 'Elegance & Beauty', emoji: '🌺' },
      { id: 'dahlia', name: 'Golden Dahlia', type: 'dahlia', palette: ['#f59e0b', '#78350f', '#fde047'], desc: 'Inner Strength', emoji: '🏵️' },
      { id: 'sunflower', name: 'Sunburst Sunflower', type: 'sunflower', palette: ['#eab308', '#713f12', '#fef08a'], desc: 'Adoration & Loyalty', emoji: '🌻' },
      { id: 'lotus', name: 'Sacred Pink Lotus', type: 'lotus', palette: ['#f472b6', '#831843', '#fbcfe8'], desc: 'Purity & Rebirth', emoji: '🪷' },
      { id: 'lily', name: 'Stargazer Lily', type: 'lily', palette: ['#ec4899', '#9d174d', '#ffffff'], desc: 'Majesty & Honor', emoji: '🌸' },
      { id: 'tulip', name: 'Dutch Velvet Tulip', type: 'tulip', palette: ['#ea580c', '#7c2d12', '#fdba74'], desc: 'Perfect Affection', emoji: '🌷' },
      { id: 'peony', name: 'Blush Peony', type: 'peony', palette: ['#fb7185', '#9f1239', '#ffe4e6'], desc: 'Prosperity & Romance', emoji: '🌺' },
      { id: 'hydrangea', name: 'Ocean Hydrangea', type: 'hydrangea', palette: ['#38bdf8', '#1e3a8a', '#bae6fd'], desc: 'Deep Gratitude', emoji: '🫐' },
      { id: 'marigold', name: 'Fiery Marigold', type: 'marigold', palette: ['#f97316', '#7c2d12', '#fef08a'], desc: 'Warmth & Creativity', emoji: '🌼' },
      { id: 'sakura', name: 'Cherry Blossom', type: 'cherry', palette: ['#f472b6', '#9d174d', '#fff1f2'], desc: 'Renewal & Hope', emoji: '🌸' },
      { id: 'lavender', name: 'French Lavender', type: 'lavender', palette: ['#a855f7', '#4c1d95', '#e9d5ff'], desc: 'Serenity & Grace', emoji: '🪻' },
      { id: 'carnation', name: 'Velvet Carnation', type: 'carnation', palette: ['#be123c', '#4c0519', '#fecdd3'], desc: 'Devotion & Admiration', emoji: '🌺' },
      { id: 'daisy', name: 'Meadow Daisy', type: 'daisy', palette: ['#ffffff', '#854d0e', '#fef08a'], desc: 'Innocence & Joy', emoji: '🌼' }
    ];

    const MESSAGES = [
      "You are loved more than you know.",
      "Your smile lights up the room.",
      "Sending you a garden of happiness and peace.",
      "You are beautiful, inside and out.",
      "Today is brighter because of your presence.",
      "Keep blooming — you are doing amazing.",
      "You make the world a better place.",
      "Thinking of you fills my heart with warmth.",
      "You are a rare and precious masterpiece.",
      "May your day be as lovely and graceful as you are.",
      "You have a heart of pure gold.",
      "Every flower blooms at its own unique pace.",
      "You are enough, exactly as you are today.",
      "Sending you peaceful energy and positive vibes.",
      "Your kindness is a light to everyone around you.",
      "Believe in your own quiet magic.",
      "You are strong, resilient, and deeply cherished.",
      "Happiness looks gorgeous on you.",
      "I admire your courage, strength, and grace.",
      "You are truly unforgettable."
    ];

    // --- REALISTIC HIGH-DIMENSIONAL SVG DEF GRADIENTS ---
    const RealisticGradients = ({ palette, idPrefix }) => {
      const cMain = palette[0];
      const cDark = palette[1];
      const cLight = palette[2] || '#ffffff';
      
      return (
        <defs>
          {/* Stem gradient */}
          <linearGradient id={`${idPrefix}-stemGrad`} x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor="#15803d" />
            <stop offset="50%" stopColor="#22c55e" />
            <stop offset="100%" stopColor="#14532d" />
          </linearGradient>

          {/* Leaf 3D Gradient */}
          <linearGradient id={`${idPrefix}-leafGrad`} x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#4ade80" />
            <stop offset="60%" stopColor="#16a34a" />
            <stop offset="100%" stopColor="#052e16" />
          </linearGradient>

          {/* Petal Outer Gradient */}
          <radialGradient id={`${idPrefix}-petalOuter`} cx="50%" cy="30%" r="70%">
            <stop offset="0%" stopColor={cLight} />
            <stop offset="50%" stopColor={cMain} />
            <stop offset="100%" stopColor={cDark} />
          </radialGradient>

          {/* Petal Inner Shadow Gradient */}
          <radialGradient id={`${idPrefix}-petalInner`} cx="50%" cy="80%" r="60%">
            <stop offset="0%" stopColor={cDark} />
            <stop offset="70%" stopColor={cMain} />
            <stop offset="100%" stopColor={cLight} />
          </radialGradient>

          {/* Golden Stamen Center */}
          <radialGradient id={`${idPrefix}-centerGold`} cx="40%" cy="40%" r="60%">
            <stop offset="0%" stopColor="#fef08a" />
            <stop offset="50%" stopColor="#eab308" />
            <stop offset="100%" stopColor="#713f12" />
          </radialGradient>

          {/* 3D Soft Shadow */}
          <filter id={`${idPrefix}-softShadow`} x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="4" stdDeviation="3" floodColor="#000000" floodOpacity="0.45" />
          </filter>
        </defs>
      );
    };

    const Stem = ({ height, curve, idPrefix }) => (
      <path 
        d={`M0,${height} Q${curve},${height/2} 0,0`} 
        stroke={`url(#${idPrefix}-stemGrad)`} 
        strokeWidth="5" 
        fill="none" 
        strokeLinecap="round"
        filter={`url(#${idPrefix}-softShadow)`}
      />
    );

    const Leaf = ({ x, y, rot, scale, idPrefix }) => (
      <g transform={`translate(${x},${y}) rotate(${rot}) scale(${scale})`}>
        <path 
          d="M0,0 Q20,-20 40,0 Q20,20 0,0" 
          fill={`url(#${idPrefix}-leafGrad)`} 
          filter={`url(#${idPrefix}-softShadow)`}
        />
        <path d="M0,0 Q20,0 40,0" stroke="#86efac" strokeWidth="0.8" opacity="0.6" />
      </g>
    );

    // --- REALISTIC HIGH-DIMENSIONAL SVG FLOWER RENDERING ---
    const RealisticFlower = ({ type, palette, size = 180, delay = 0, idPrefix }) => {
      const renderRealisticPetals = () => {
        switch(type) {
          case 'rose':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`}>
                {/* Outer velvet petals */}
                {[...Array(10)].map((_, i) => (
                  <path 
                    key={`out-${i}`} 
                    d="M0,0 C-28,-38 28,-42 0,-8" 
                    fill={`url(#${idPrefix}-petalOuter)`} 
                    transform={`rotate(${i*36}) scale(1.4)`} 
                    opacity="0.95" 
                  />
                ))}
                {/* Mid layer petals */}
                {[...Array(8)].map((_, i) => (
                  <path 
                    key={`mid-${i}`} 
                    d="M0,0 C-22,-30 22,-30 0,-4" 
                    fill={`url(#${idPrefix}-petalInner)`} 
                    transform={`rotate(${i*45 + 22.5}) scale(1.15)`} 
                  />
                ))}
                {/* Inner bud core */}
                {[...Array(6)].map((_, i) => (
                  <path 
                    key={`bud-${i}`} 
                    d="M0,0 C-14,-20 14,-20 0,0" 
                    fill={`url(#${idPrefix}-petalOuter)`} 
                    transform={`rotate(${i*60}) scale(0.85)`} 
                  />
                ))}
                <circle r="5" fill="#4c0519" opacity="0.6" />
              </g>
            );

          case 'orchid':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`}>
                {/* Lateral Sepals */}
                <path d="M0,0 Q-40,-50 -25,-75 Q0,-50 0,0" fill={`url(#${idPrefix}-petalOuter)`} transform="rotate(-30)" />
                <path d="M0,0 Q40,-50 25,-75 Q0,-50 0,0" fill={`url(#${idPrefix}-petalOuter)`} transform="rotate(30)" />
                <path d="M0,0 Q0,-65 0,-80 Q0,-50 0,0" fill={`url(#${idPrefix}-petalOuter)`} />
                {/* Upper Petals */}
                <ellipse cx="-35" cy="-25" rx="25" ry="35" fill={`url(#${idPrefix}-petalInner)`} transform="rotate(-20)" />
                <ellipse cx="35" cy="-25" rx="25" ry="35" fill={`url(#${idPrefix}-petalInner)`} transform="rotate(20)" />
                {/* Distinctive Orchid Lip (Labellum) */}
                <path d="M-18,-10 Q0,25 18,-10 Q0,5 -18,-10 Z" fill="#f43f5e" />
                <circle r="7" fill={`url(#${idPrefix}-centerGold)`} cy="-10" />
              </g>
            );

          case 'dahlia':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`}>
                {[...Array(32)].map((_, i) => (
                  <path 
                    key={`dahlia-out-${i}`} 
                    d="M0,0 Q8,-30 0,-48 Q-8,-30 0,0" 
                    fill={i%2 ? `url(#${idPrefix}-petalOuter)` : `url(#${idPrefix}-petalInner)`} 
                    transform={`rotate(${i * 11.25}) scale(1.3)`} 
                  />
                ))}
                {[...Array(24)].map((_, i) => (
                  <path 
                    key={`dahlia-mid-${i}`} 
                    d="M0,0 Q6,-22 0,-35 Q-6,-22 0,0" 
                    fill={`url(#${idPrefix}-petalOuter)`} 
                    transform={`rotate(${i * 15 + 7.5}) scale(1)`} 
                  />
                ))}
                <circle r="12" fill={`url(#${idPrefix}-centerGold)`} />
              </g>
            );

          case 'sunflower':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`}>
                {[...Array(28)].map((_, i) => (
                  <path 
                    key={i} 
                    d="M0,-12 Q7,-42 0,-55 Q-7,-42 0,-12" 
                    fill={i%2 ? `url(#${idPrefix}-petalOuter)` : `url(#${idPrefix}-petalInner)`} 
                    transform={`rotate(${i * 12.85})`} 
                  />
                ))}
                <circle r="24" fill="#451a03" stroke="#78350f" strokeWidth="2.5" />
                <circle r="18" fill="#290f03" opacity="0.9" />
                {[...Array(12)].map((_, i) => (
                  <circle key={`dot-${i}`} cx={Math.cos(i)*10} cy={Math.sin(i)*10} r="2" fill="#fbbf24" opacity="0.8" />
                ))}
              </g>
            );

          case 'lotus':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`} transform="translate(0, -10)">
                {[...Array(14)].map((_, i) => (
                  <path 
                    key={`lotus-out-${i}`} 
                    d="M0,0 C-22,-45 22,-45 0,0" 
                    fill={`url(#${idPrefix}-petalOuter)`} 
                    transform={`rotate(${(i-7)*18}) scale(1.3)`} 
                  />
                ))}
                {[...Array(10)].map((_, i) => (
                  <path 
                    key={`lotus-in-${i}`} 
                    d="M0,0 C-15,-32 15,-32 0,0" 
                    fill={`url(#${idPrefix}-petalInner)`} 
                    transform={`rotate(${(i-5)*20}) scale(1.05)`} 
                  />
                ))}
                <circle r="11" fill={`url(#${idPrefix}-centerGold)`} cy="-5" />
              </g>
            );

          case 'lily':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`}>
                {[...Array(6)].map((_, i) => (
                  <g key={i} transform={`rotate(${i*60})`}>
                    <path d="M0,0 Q14,-45 0,-68 Q-14,-45 0,0" fill={i%2 ? `url(#${idPrefix}-petalOuter)` : `url(#${idPrefix}-petalInner)`} />
                    <circle cx="0" cy="-30" r="1.5" fill="#881337" opacity="0.7" />
                    <circle cx="4" cy="-40" r="1.5" fill="#881337" opacity="0.7" />
                    <circle cx="-4" cy="-35" r="1.5" fill="#881337" opacity="0.7" />
                  </g>
                ))}
                {/* Prominent Stamens */}
                {[...Array(6)].map((_, i) => (
                  <g key={`stamen-${i}`} transform={`rotate(${i*60 + 30})`}>
                    <line x1="0" y1="0" x2="0" y2="-28" stroke="#fef08a" strokeWidth="2" />
                    <ellipse cx="0" cy="-30" rx="4" ry="2" fill="#78350f" />
                  </g>
                ))}
                <circle r="5" fill="#15803d" />
              </g>
            );

          case 'tulip':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`} transform="translate(0, -28)">
                <path d="M-26,20 Q-32,-50 0,-68 Q32,-50 26,20 Z" fill={`url(#${idPrefix}-petalOuter)`} />
                <path d="M-18,20 Q-22,-45 0,-60 Q22,-45 18,20 Z" fill={`url(#${idPrefix}-petalInner)`} />
                <path d="M-10,20 Q-12,-38 0,-52 Q12,-38 10,20 Z" fill={`url(#${idPrefix}-petalOuter)`} opacity="0.9" />
              </g>
            );

          case 'peony':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`}>
                {[...Array(16)].map((_, i) => (
                  <path key={`p-out-${i}`} d="M0,0 C-30,-32 30,-32 0,0" fill={`url(#${idPrefix}-petalOuter)`} transform={`rotate(${i*22.5}) scale(1.35)`} opacity="0.9" />
                ))}
                {[...Array(12)].map((_, i) => (
                  <path key={`p-mid-${i}`} d="M0,0 C-22,-25 22,-25 0,0" fill={`url(#${idPrefix}-petalInner)`} transform={`rotate(${i*30 + 15}) scale(1.1)`} />
                ))}
                {[...Array(8)].map((_, i) => (
                  <path key={`p-in-${i}`} d="M0,0 C-14,-16 14,-16 0,0" fill={`url(#${idPrefix}-petalOuter)`} transform={`rotate(${i*45}) scale(0.8)`} />
                ))}
                <circle r="8" fill={`url(#${idPrefix}-centerGold)`} />
              </g>
            );

          case 'hydrangea':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`} transform="translate(0,-18)">
                {[...Array(24)].map((_, i) => {
                  const angle = (i / 24) * Math.PI * 2;
                  const dist = (i % 3 + 1) * 12;
                  const cx = Math.cos(angle) * dist;
                  const cy = Math.sin(angle) * dist - 8;
                  return (
                    <g key={i} transform={`translate(${cx},${cy}) scale(0.65)`}>
                      {[0, 90, 180, 270].map(rot => (
                        <path key={rot} d="M0,0 Q-10,-12 0,-18 Q10,-12 0,0" fill={i%2 ? `url(#${idPrefix}-petalOuter)` : `url(#${idPrefix}-petalInner)`} transform={`rotate(${rot})`} />
                      ))}
                      <circle r="2" fill="#ffffff" />
                    </g>
                  );
                })}
              </g>
            );

          case 'marigold':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`}>
                {[...Array(40)].map((_, i) => (
                  <path key={i} d="M0,0 Q6,-22 0,-32 Q-6,-22 0,0" fill={i%2 ? `url(#${idPrefix}-petalOuter)` : `url(#${idPrefix}-petalInner)`} transform={`rotate(${i*9}) scale(1.2)`} />
                ))}
                <circle r="10" fill={`url(#${idPrefix}-centerGold)`} />
              </g>
            );

          case 'cherry':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`}>
                {[...Array(5)].map((_, i) => (
                  <g key={i} transform={`rotate(${i*72})`}>
                    <path d="M0,0 C-18,-25 -10,-45 0,-40 C10,-45 18,-25 0,0" fill={`url(#${idPrefix}-petalOuter)`} />
                  </g>
                ))}
                {[...Array(10)].map((_, i) => (
                  <line key={i} x1="0" y1="0" x2="0" y2="-18" stroke="#9d174d" strokeWidth="1.2" transform={`rotate(${i*36 + 18})`} />
                ))}
                <circle r="4" fill="#f472b6" />
              </g>
            );

          case 'lavender':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`} transform="translate(0, -15)">
                {[...Array(16)].map((_, i) => (
                  <g key={i} transform={`translate(0, ${-i * 7})`}>
                    <ellipse cx="-6" cy="0" rx="5" ry="6" fill={`url(#${idPrefix}-petalOuter)`} transform="rotate(-20)" />
                    <ellipse cx="6" cy="0" rx="5" ry="6" fill={`url(#${idPrefix}-petalInner)`} transform="rotate(20)" />
                    <ellipse cx="0" cy="-3" rx="4" ry="5" fill={`url(#${idPrefix}-petalOuter)`} />
                  </g>
                ))}
              </g>
            );

          case 'carnation':
            return (
              <g filter={`url(#${idPrefix}-softShadow)`}>
                {[...Array(24)].map((_, i) => (
                  <path key={i} d="M0,0 Q-15,-28 -5,-35 Q0,-30 5,-35 Q15,-28 0,0" fill={i%2 ? `url(#${idPrefix}-petalOuter)` : `url(#${idPrefix}-petalInner)`} transform={`rotate(${i*15}) scale(1.25)`} />
                ))}
                <circle r="8" fill="#4c0519" opacity="0.8" />
              </g>
            );

          case 'daisy':
          default:
            return (
              <g filter={`url(#${idPrefix}-softShadow)`}>
                {[...Array(20)].map((_, i) => (
                  <path key={i} d="M0,0 Q6,-30 0,-48 Q-6,-30 0,0" fill="#ffffff" stroke="#f1f5f9" strokeWidth="0.8" transform={`rotate(${i*18}) scale(1.2)`} />
                ))}
                <circle r="16" fill={`url(#${idPrefix}-centerGold)`} />
              </g>
            );
        }
      };

      return (
        <svg 
          width={size} height={size*1.7} 
          viewBox="-75 -130 150 200" 
          style={{ overflow: 'visible', animation: `sway 4s ease-in-out infinite alternate ${Math.random()*2}s` }}
        >
          <RealisticGradients palette={palette} idPrefix={idPrefix} />
          <Stem height={90} curve={Math.random() > 0.5 ? 18 : -18} idPrefix={idPrefix} />
          <Leaf x={-12} y={45} rot={-55} scale={1} idPrefix={idPrefix} />
          <Leaf x={12} y={65} rot={55} scale={1} idPrefix={idPrefix} />
          
          <g style={{ 
            animation: `bloom 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards`, 
            animationDelay: `${delay}ms`,
            opacity: 0 
          }}>
            {renderRealisticPetals()}
          </g>
        </svg>
      );
    };

    // --- BOUQUET COMPONENT ---
    const Bouquet = ({ flower }) => {
      const composition = [
        // Back Foliage & Fillers
        { x: -90, y: 15, scale: 1.0, type: 'foliage', rot: -30, delay: 0 },
        { x: 90, y: 15, scale: 1.0, type: 'foliage', rot: 30, delay: 100 },
        { x: -50, y: -15, scale: 0.95, type: 'foliage', rot: -15, delay: 150 },
        { x: 50, y: -15, scale: 0.95, type: 'foliage', rot: 15, delay: 200 },
        { x: 0, y: -30, scale: 1.15, type: flower.type, rot: 0, delay: 250 },

        // Middle Layer
        { x: -65, y: 30, scale: 1.05, type: flower.type, rot: -22, delay: 350 },
        { x: 65, y: 30, scale: 1.05, type: flower.type, rot: 22, delay: 450 },
        { x: -30, y: 45, scale: 1.15, type: flower.type, rot: -10, delay: 500 },
        { x: 30, y: 45, scale: 1.15, type: flower.type, rot: 10, delay: 550 },

        // Front Hero Layer
        { x: -40, y: 80, scale: 1.25, type: flower.type, rot: -15, delay: 650 },
        { x: 40, y: 80, scale: 1.25, type: flower.type, rot: 15, delay: 700 },
        { x: 0, y: 95, scale: 1.35, type: flower.type, rot: 0, delay: 750 },
      ];

      return (
        <div className="bouquet-inner">
          {/* Glassmorphism Wrapping Paper & Silk Ribbon */}
          <div style={{
            position: 'absolute', bottom: 10, left: '50%', transform: 'translateX(-50%)',
            width: 140, height: 180, 
            background: 'linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.05))',
            backdropFilter: 'blur(10px)',
            borderRadius: '0 0 25px 25px', 
            border: '1.5px solid rgba(255,255,255,0.4)',
            boxShadow: '0 15px 35px rgba(0,0,0,0.5)',
            zIndex: 5
          }}></div>

          <div style={{ // Silk Ribbon
            position: 'absolute', bottom: 145, left: '50%', transform: 'translateX(-50%)',
            width: 150, height: 28, 
            background: 'linear-gradient(90deg, #f43f5e, #e11d48, #be123c)',
            borderRadius: '14px', 
            boxShadow: '0 4px 15px rgba(244,63,94,0.6)',
            zIndex: 6
          }}></div>

          {composition.map((item, i) => (
            <div key={i} style={{
              position: 'absolute',
              bottom: 140 + item.y,
              left: '50%',
              marginLeft: item.x,
              transform: `translate(-50%) rotate(${item.rot}deg) scale(${item.scale})`,
              zIndex: item.scale > 1.2 ? 10 : item.type === 'foliage' ? 1 : 5,
              transformOrigin: 'bottom center'
            }}>
              {item.type === 'foliage' ? (
                <svg width="160" height="220" viewBox="0 0 100 150" style={{opacity:0, animation: `bloom 1s forwards ${item.delay}ms`}}>
                  <defs>
                    <linearGradient id={`foliageGrad-${i}`} x1="0" y1="0" x2="1" y2="1">
                      <stop offset="0%" stopColor="#4ade80" />
                      <stop offset="100%" stopColor="#15803d" />
                    </linearGradient>
                  </defs>
                  <path d="M50,150 Q10,80 50,0 Q90,80 50,150" fill={`url(#foliageGrad-${i})`} opacity="0.85" />
                  <path d="M50,150 Q30,100 20,60 Q40,80 50,150" fill={`url(#foliageGrad-${i})`} opacity="0.65" />
                  <path d="M50,150 Q70,100 80,60 Q60,80 50,150" fill={`url(#foliageGrad-${i})`} opacity="0.65" />
                </svg>
              ) : (
                <RealisticFlower 
                  type={flower.type} 
                  palette={flower.palette} 
                  delay={item.delay}
                  size={210} 
                  idPrefix={`fl-${i}-${flower.id}`}
                />
              )}
            </div>
          ))}
        </div>
      );
    };

    // --- MAIN APP COMPONENT ---
    const App = () => {
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [selectedFlower, setSelectedFlower] = useState(FLOWERS[0]);
      const [currentMessage, setCurrentMessage] = useState('');
      const [key, setKey] = useState(0); 
      const [toastMsg, setToastMsg] = useState(null);
      
      // MUSIC STATE
      const [isMuted, setIsMuted] = useState(true);
      const audioRef = useRef(null);
      const canvasAreaRef = useRef(null);

      const toggleMusic = () => {
        if (!audioRef.current) return;
        if (isMuted) {
          audioRef.current.play().catch(e => console.log("Audio play prevented:", e));
        } else {
          audioRef.current.pause();
        }
        setIsMuted(!isMuted);
      };

      const pickRandomMessage = () => {
        const idx = Math.floor(Math.random() * MESSAGES.length);
        setCurrentMessage(MESSAGES[idx]);
      };

      useEffect(() => {
        pickRandomMessage();
      }, []);

      const handleRefresh = () => {
        pickRandomMessage();
        setKey(prev => prev + 1); 
      };

      // EXPORT TO IMAGE FEATURE
      const handleExportImage = async () => {
        if (!canvasAreaRef.current) return;
        
        try {
          showToast("📷 Generating high-res image...");
          const canvas = await html2canvas(canvasAreaRef.current, {
            scale: 2,
            useCORS: true,
            backgroundColor: "#0f172a",
            logging: false,
            ignoreElements: (element) => {
              return element.classList.contains('controls-bar') || 
                     element.classList.contains('music-btn') || 
                     element.classList.contains('menu-toggle') ||
                     element.classList.contains('toast');
            }
          });
          
          const image = canvas.toDataURL("image/png");
          const link = document.createElement("a");
          link.href = image;
          link.download = `eternal-bouquet-${selectedFlower.id}.png`;
          link.click();
          showToast("✅ Bouquet image downloaded!");
        } catch (err) {
          console.error("Export failed:", err);
          showToast("❌ Export failed. Try again.");
        }
      };

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(null), 3200);
      };

      return (
        <>
          {toastMsg && <div className="toast">{toastMsg}</div>}

          <button 
            className="menu-toggle" 
            onClick={() => setSidebarOpen(!sidebarOpen)}
            aria-label="Toggle Menu"
          >
            {sidebarOpen ? '✕' : '☰'}
          </button>

          <nav className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
            <div className="sidebar-header">
              <div className="brand">Eternal Bouquet</div>
              <p style={{fontSize: '0.8rem', color: 'var(--text-muted)', marginTop: '4px'}}>
                14 High-Dimensional Blooms
              </p>
            </div>
            
            <div className="flower-list">
              {FLOWERS.map(f => (
                <div 
                  key={f.id} 
                  className={`flower-item ${selectedFlower.id === f.id ? 'active' : ''}`}
                  onClick={() => {
                    setSelectedFlower(f);
                    setKey(prev => prev + 1); 
                    if(window.innerWidth < 768) setSidebarOpen(false);
                  }}
                >
                  <div className="flower-emoji">{f.emoji}</div>
                  <div className="flower-info">
                    <h4>{f.name}</h4>
                    <span>{f.desc}</span>
                  </div>
                </div>
              ))}
            </div>
          </nav>

          <main className="canvas-area" ref={canvasAreaRef}>
            {/* Ambient Floating Petals */}
            <div className="ambient-petals">
              {[...Array(12)].map((_, i) => (
                <div 
                  key={i} 
                  className="ambient-petal" 
                  style={{
                    left: `${(i * 8.3)}%`,
                    width: `${12 + (i % 4) * 6}px`,
                    height: `${16 + (i % 4) * 8}px`,
                    animationDelay: `${i * 1.1}s`,
                    animationDuration: `${9 + (i % 3) * 4}s`
                  }}
                />
              ))}
            </div>

            {/* Audio Track */}
            <audio ref={audioRef} loop src="furelise.mp3" />
            
            <button className="music-btn" onClick={toggleMusic} title="Toggle Background Music">
              {isMuted ? '🔇' : '🎼'}
            </button>
            
            <div className="message-card" key={`msg-${key}`}>
              <div className="message-text">"{currentMessage}"</div>
              <div className="message-decoration">♥</div>
            </div>

            <div className="bouquet-container" key={`bouquet-${key}`}>
              <Bouquet flower={selectedFlower} />
            </div>

            {/* Action Buttons */}
            <div className="controls-bar">
              <button className="action-btn" onClick={handleRefresh}>
                <span>✨</span> New Wish
              </button>
              
              <button className="action-btn primary" onClick={handleExportImage}>
                <span>📷</span> Export Image
              </button>
            </div>
            
          </main>
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
